<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 Deficit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #21262d;
      --text: #e6edf3; --muted: #7d8590; --accent: #d2a8ff;
      --green: #3fb950; --red: #f85149; --warn: #d29922; --blue: #58a6ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 16px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 700; }
    .sub { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
    .sync { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
    .card { background: var(--card); border-radius: 10px; padding: 14px 16px; border-left: 3px solid var(--accent); }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
    .card-value { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .chart-box { background: var(--card); border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .chart-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
    .chart-range { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
    .tbl-wrap { background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 10px 8px; text-align: right; color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 8px; text-align: right; }
    tr { border-bottom: 1px solid var(--border); }
    .btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 24px; font-family: inherit; }
    .btn:hover { opacity: 0.9; }
    .form-box { background: var(--card); border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .form-input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin-top: 4px; font-family: inherit; }
    .form-preview { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .form-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-save { flex: 1; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save:disabled { background: var(--border); color: var(--muted); cursor: default; }
    .btn-cancel { padding: 10px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .toggle-btn { width: 100%; padding: 8px; background: transparent; border: none; border-top: 1px solid var(--border); color: var(--muted); font-size: 11px; cursor: pointer; font-family: inherit; }
    .tbl-footer { padding: 6px 8px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }
    .refresh-btn { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 11px; padding: 2px 6px; font-family: inherit; }
    .error { background: #3b1219; border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--red); }
    .loading { display: flex; justify-content: center; align-items: center; height: 80vh; color: var(--muted); font-size: 14px; }
    .footer { text-align: center; font-size: 10px; color: var(--muted); padding: 16px 0; }
    .def-green { color: var(--green); font-weight: 600; }
    .def-warn { color: var(--warn); font-weight: 600; }
    .def-red { color: var(--red); font-weight: 600; }
    .def-muted { color: var(--muted); }
    .w-text { color: var(--text); font-weight: 500; }
    .avg5 { color: var(--blue); font-size: 11px; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="loading">Ładowanie danych z Google Sheets...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw5gj4hFbJWduJr_PZtwlhDvplLa2ytc4lf0O6qmJw47-Bf6XFguGj87seOyt7n-rXLsw/exec";
    const GOAL = 60000;
    const KCAL_PER_KG = 7700;

    let DATA = [];
    let EXPANDED = false;
    let FORM_OPEN = false;
    let SAVING = false;
    let LAST_SYNC = null;
    let ERROR = null;

    function toDateStr(v) {
      if (!v) return "";
      return String(v).split("T")[0];
    }
    function parseNum(v) {
      if (v === null || v === undefined || v === "") return null;
      const n = Number(v);
      return isNaN(n) ? null : n;
    }
    function fmtDate(iso) {
  if (!iso) return "—";
  const parts = iso.split("T")[0].split("-");
  return parts[2] + "." + parts[1];
}
    function addDays(ds, n) {
      const d = new Date(ds + "T12:00:00");
      d.setDate(d.getDate() + n);
      return d.toISOString().split("T")[0];
    }
    function daysBetween(a, b) {
      return Math.round((new Date(b + "T12:00:00") - new Date(a + "T12:00:00")) / 86400000);
    }

    async function fetchData() {
      try {
        ERROR = null;
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.success) {
          DATA = json.data.map(r => ({
            date: toDateStr(r["Data"]),
            weight: parseNum(r["Waga"]),
            eaten: parseNum(r["Spożyte"]) ?? parseNum(r["SpoÅ¼yte"]),
            burned_raw: parseNum(r["Oura Raw"]),
            burned: parseNum(r["Spalone (x0.9)"]),
            deficit: parseNum(r["Deficyt"]),
          }));
          LAST_SYNC = new Date();
        } else {
          ERROR = "Błąd API: " + (json.error || "nieznany");
        }
      } catch (e) {
        ERROR = "Nie udało się pobrać danych: " + e.message;
      }
      render();
    }

    async function addEntry(entry) {
      SAVING = true;
      render();
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(entry) });
        const json = await res.json();
        if (json.success) { await fetchData(); }
        else { ERROR = "Błąd zapisu: " + (json.error || "nieznany"); }
      } catch (e) {
        ERROR = "Nie udało się zapisać: " + e.message;
      }
      SAVING = false;
      FORM_OPEN = false;
      render();
    }

    function getAvg5(idx) {
      const w = [];
      for (let j = idx; j >= 0 && w.length < 5; j--) {
        if (DATA[j].weight) w.push(DATA[j].weight);
      }
      return w.length > 0 ? (w.reduce((a, b) => a + b, 0) / w.length).toFixed(1) : null;
    }

    function currentWeight() {
      for (let i = DATA.length - 1; i >= 0; i--) {
        if (DATA[i].weight) return DATA[i].weight;
      }
      return 80;
    }

    function render() {
      const app = document.getElementById("app");
      if (DATA.length === 0 && !ERROR) {
        app.innerHTML = '<div class="loading">Ładowanie danych z Google Sheets...</div>';
        return;
      }

      const cw = currentWeight();
      const withDef = DATA.filter(d => d.deficit !== null && d.deficit !== undefined);
      const totalDef = withDef.reduce((s, d) => s + d.deficit, 0);
      const avgDef = withDef.length > 0 ? totalDef / withDef.length : 0;
      const pct = ((totalDef / GOAL) * 100).toFixed(1);
      const remaining = GOAL - totalDef;
      const daysToGoal = avgDef > 0 ? Math.ceil(remaining / avgDef) : 99999;
      const today = new Date().toISOString().split("T")[0];
      const goalDate = daysToGoal < 9999 ? addDays(today, daysToGoal) : null;
      const m17d = daysBetween(today, "2026-05-17");
      const m30d = daysBetween(today, "2026-05-30");
      const wm17 = cw - ((totalDef + avgDef * m17d) / KCAL_PER_KG);
      const wm30 = cw - ((totalDef + avgDef * m30d) / KCAL_PER_KG);
      const goalDateStr = goalDate ? new Date(goalDate + "T12:00:00").toLocaleDateString("pl-PL", { day: "numeric", month: "long", year: "numeric" }) : "—";
      const lastDate = DATA.length > 0 ? DATA[DATA.length - 1].date : today;

      // Charts
      const defChart = buildDeficitChart(withDef);
      const wChart = buildWeightChart(DATA.filter(d => d.weight));

      // Table
      const display = EXPANDED ? DATA : DATA.slice(-5);
      const tableRows = display.map(d => {
        const idx = DATA.findIndex(x => x.date === d.date);
        const a5 = getAvg5(idx);
        const defClass = d.deficit == null ? "def-muted" : d.deficit >= 400 ? "def-green" : d.deficit >= 0 ? "def-warn" : "def-red";
        return `<tr>
          <td class="w-text" style="text-align:left">${fmtDate(d.date)}</td>
          <td>${d.weight ?? "—"}</td>
          <td class="avg5">${a5 ?? "—"}</td>
          <td>${d.eaten ?? "—"}</td>
          <td>${d.burned ?? "—"}</td>
          <td class="${defClass}">${d.deficit != null ? d.deficit : "—"}</td>
        </tr>`;
      }).join("");

      const toggleBtn = DATA.length > 5 ? `<button class="toggle-btn" onclick="EXPANDED=!EXPANDED;render()">${EXPANDED ? "Pokaż mniej ▲" : "Pokaż wszystkie (" + DATA.length + ") ▼"}</button>` : "";

      // Form
      const nextDate = addDays(lastDate, 1);
      let formHtml = "";
      if (FORM_OPEN) {
        formHtml = `<div class="form-box">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Nowy wpis</div>
          <div class="form-grid">
            <div><label class="form-label">Data</label><input class="form-input" type="date" id="f-date" value="${nextDate}"></div>
            <div><label class="form-label">Waga (kg)</label><input class="form-input" type="number" id="f-weight" placeholder="80.2" step="0.1"></div>
            <div><label class="form-label">Oura total cal</label><input class="form-input" type="number" id="f-oura" placeholder="3002" oninput="updatePreview()"></div>
            <div><label class="form-label">Spożyte (kcal)</label><input class="form-input" type="number" id="f-eaten" placeholder="2200" oninput="updatePreview()"></div>
          </div>
          <div class="form-preview" id="preview"></div>
          <div class="form-actions">
            <button class="btn-save" id="save-btn" onclick="submitForm()" ${SAVING ? "disabled" : ""}>${SAVING ? "Zapisuję..." : "Zapisz"}</button>
            <button class="btn-cancel" onclick="FORM_OPEN=false;render()">Anuluj</button>
          </div>
        </div>`;
      } else {
        formHtml = `<button class="btn" onclick="FORM_OPEN=true;render()">+ Dodaj dzień</button>`;
      }

      app.innerHTML = `
        <div style="margin-bottom:24px">
          <h1>🔥 Deficit Tracker</h1>
          <div class="sub">
            <span>Cel: ${(GOAL/1000).toFixed(0)}k kcal → ${(cw - GOAL/KCAL_PER_KG).toFixed(1)} kg</span>
            <button class="refresh-btn" onclick="fetchData()">↻ Odśwież</button>
          </div>
          ${LAST_SYNC ? `<div class="sync">Ostatnia sync: ${LAST_SYNC.toLocaleTimeString("pl-PL")}</div>` : ""}
        </div>
        ${ERROR ? `<div class="error">${ERROR}</div>` : ""}
        <div class="grid">
          <div class="card"><div class="card-label">Suma deficytu</div><div class="card-value" style="color:var(--accent)">${Math.round(totalDef).toLocaleString("pl")} kcal</div><div class="card-sub">${pct}% z ${(GOAL/1000).toFixed(0)}k</div></div>
          <div class="card" style="border-color:${avgDef>=400?"var(--green)":"var(--warn)"}"><div class="card-label">Śr. deficyt/dzień</div><div class="card-value" style="color:${avgDef>=400?"var(--green)":"var(--warn)"}">${Math.round(avgDef)} kcal</div><div class="card-sub">${withDef.length} dni danych</div></div>
          <div class="card" style="border-color:var(--blue)"><div class="card-label">Prognoza 17.05</div><div class="card-value" style="color:var(--blue)">${wm17.toFixed(1)} kg</div><div class="card-sub">za ${m17d} dni</div></div>
          <div class="card" style="border-color:var(--blue)"><div class="card-label">Prognoza 30.05</div><div class="card-value" style="color:var(--blue)">${wm30.toFixed(1)} kg</div><div class="card-sub">za ${m30d} dni</div></div>
          <div class="card"><div class="card-label">Cel 60k kcal</div><div class="card-value" style="color:var(--accent)">${goalDateStr}</div><div class="card-sub">${daysToGoal<9999?"za "+daysToGoal+" dni":"brak danych"}</div></div>
          <div class="card" style="border-color:var(--green)"><div class="card-label">Waga docelowa</div><div class="card-value" style="color:var(--green)">${(cw-GOAL/KCAL_PER_KG).toFixed(1)} kg</div><div class="card-sub">z ${cw} kg</div></div>
        </div>
        ${defChart}
        ${wChart}
        ${formHtml}
        <div class="tbl-wrap">
          <div style="overflow-x:auto">
            <table>
              <thead><tr>
                <th style="text-align:left">Data</th><th>Waga</th><th>Śr. 5d</th><th>Spożyte</th><th>Spalone*</th><th>Deficyt</th>
              </tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
          ${toggleBtn}
          <div class="tbl-footer">* Spalanie = Oura total cal × 0.9</div>
        </div>
        <div class="footer">Dane z Google Sheets • Apps Script API</div>
      `;
    }

    function buildDeficitChart(arr) {
      if (arr.length < 2) return "";
      const max = Math.max(...arr.map(d => Math.abs(d.deficit)), 1);
      const w = 100, h = 60;
      const step = w / (arr.length - 1);
      const zeroY = h - ((0 + max) / (2 * max)) * h;
      let pts = [], dots = "";
      arr.forEach((d, i) => {
        const x = i * step;
        const y = h - ((d.deficit + max) / (2 * max)) * h;
        pts.push(`${x},${y}`);
        dots += `<circle cx="${x}" cy="${y}" r="2.5" fill="${d.deficit >= 0 ? 'var(--green)' : 'var(--red)'}"/>`;
      });
      return `<div class="chart-box">
        <div class="chart-label">Deficyt dzienny (kcal)</div>
        <svg viewBox="-4 -4 ${w+8} ${h+8}" style="width:100%;height:80px">
          <line x1="0" y1="${zeroY}" x2="${w}" y2="${zeroY}" stroke="var(--muted)" stroke-width="0.3" stroke-dasharray="2,2"/>
          <polyline points="${pts.join(" ")}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
        </svg>
        <div class="chart-range"><span>${fmtDate(arr[0].date)}</span><span>${fmtDate(arr[arr.length-1].date)}</span></div>
      </div>`;
    }

    function buildWeightChart(arr) {
      if (arr.length < 2) return "";
      const ws = arr.map(d => d.weight);
      const minW = Math.min(...ws) - 0.3, maxW = Math.max(...ws) + 0.3;
      const range = maxW - minW || 1;
      const w = 100, h = 60;
      const step = w / (arr.length - 1);
      let pts = [], dots = "";
      arr.forEach((d, i) => {
        const x = i * step;
        const y = h - ((d.weight - minW) / range) * h;
        pts.push(`${x},${y}`);
        const label = i === arr.length - 1 ? `<text x="${x}" y="${y-6}" fill="var(--blue)" font-size="5" text-anchor="end" font-weight="700">${d.weight}</text>` : "";
        dots += `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--blue)"/>${label}`;
      });
      return `<div class="chart-box">
        <div class="chart-label">Waga (kg)</div>
        <svg viewBox="-4 -4 ${w+8} ${h+8}" style="width:100%;height:80px">
          <polyline points="${pts.join(" ")}" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
        </svg>
        <div class="chart-range"><span>${fmtDate(arr[0].date)}</span><span>${fmtDate(arr[arr.length-1].date)}</span></div>
      </div>`;
    }

    function updatePreview() {
      const oura = document.getElementById("f-oura")?.value;
      const eaten = document.getElementById("f-eaten")?.value;
      const el = document.getElementById("preview");
      if (!el || !oura || !eaten) { if (el) el.innerHTML = ""; return; }
      const burned = Math.round(parseFloat(oura) * 0.9);
      const def = burned - parseInt(eaten);
      el.innerHTML = `Spalanie −10%: <b style="color:var(--text)">${burned}</b> kcal → deficyt: <b style="color:${def>=0?"var(--green)":"var(--red)"}">${def} kcal</b>`;
    }

    function submitForm() {
      const date = document.getElementById("f-date").value;
      const weight = parseFloat(document.getElementById("f-weight").value);
      const oura = document.getElementById("f-oura").value;
      const eaten = document.getElementById("f-eaten").value;
      if (!date || !weight) return;
      addEntry({
        date,
        weight,
        oura_raw: oura ? parseInt(oura) : null,
        eaten: eaten ? parseInt(eaten) : null,
      });
    }

    fetchData();
  </script>
</body>
</html>
